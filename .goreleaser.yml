project_name: doopl
dist: dist

builds:
  - id: doopl
    main: ./cmd/doopl
    binary: doopl
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    goamd64: v3
    ignore:
      - goos: windows

  - id: doopl-mcp
    main: ./cmd/doopl-mcp
    binary: doopl-mcp
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    goamd64: v3
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: arashackdev
    repo: doopl
  generate_release_notes: true
  prerelease: auto
