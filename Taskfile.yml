# https://taskfile.dev
version: "3"

vars:
  MODULE: github.com/arashackdev/doopl
  GOVERTER_PKGS: ./internal/convert/... ./cmd/doopl/internal/convert/...
  REVIVE_VERSION: v1.14.0
  GOVERTER_VERSION: v1.9.4
  GORELEASER_VERSION: latest

tasks:
  default:
    desc: Run the standard local check (fmt, vet, lint, generate:check, test)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: generate:check
      - task: test

  ci:
    desc: Run CI checks (used by GitHub Actions)
    cmds:
      - task: fmt:check
      - task: vet
      - task: lint
      - task: generate:check
      - task: test

  tools:
    desc: Install pinned dev tools (revive, goverter, goreleaser) — versions are tracked in vars
    cmds:
      - go install github.com/mgechev/revive@{{.REVIVE_VERSION}}
      - go install github.com/jmattheis/goverter/cmd/goverter@{{.GOVERTER_VERSION}}
      - go install github.com/goreleaser/goreleaser@{{.GORELEASER_VERSION}}

  fmt:
    desc: Format all Go source
    cmds:
      - gofmt -l -w .

  fmt:check:
    desc: Fail if any file is not gofmt-formatted (CI use)
    cmds:
      - test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run revive against the whole module (excludes generated files)
    cmds:
      - revive -config revive.toml -formatter friendly ./pkg/deepl/... ./internal/apimodel/... ./internal/transport/... ./internal/config/... ./cmd/doopl/command*.go ./cmd/doopl/main.go ./cmd/doopl/auth.go ./cmd/doopl/output.go ./cmd/doopl/commands.go ./cmd/doopl/internal/entity/... ./cmd/doopl/internal/output/...

  generate:
    desc: Regenerate all goverter converters (runs go mod tidy to ensure consistency)
    cmds:
      - go mod tidy
      - go generate ./...

  generate:check:
    desc: Fail if generated converters are stale (CI use — run generate, then git diff)
    cmds:
      - task: generate
      - git diff --exit-code -- '**/converter_gen.go'

  build:
    desc: Build the library and CLI
    cmds:
      - go build ./...

  test:
    desc: Run the test suite
    cmds:
      - go test ./... -race -cover

  generate:mocks:
    desc: Generate mocks for testing with mockery
    cmds:
      - mockery --all --inpackage --with-expecter --output=internal/mocks --dir=internal/interfaces

  test:report:
    desc: Generate test coverage report
    cmds:
      - go test ./... -cover -json > test-report.json
      - go run scripts/generate_test_report.go test-report.json > docs/TEST_REPORT.md

  cli:build:
    desc: Build the doopl CLI binary to ./bin/doopl (optimized for production)
    vars:
      VERSION:
        sh: git describe --tags --always 2>/dev/null || echo "dev"
    cmds:
      - mkdir -p bin
      - go build -trimpath -ldflags="-s -w" -o bin/doopl ./cmd/doopl

  cli:install:
    desc: Install optimized doopl CLI to $GOPATH/bin/doopl
    cmds:
      - go install -trimpath -ldflags="-s -w" ./cmd/doopl

  mcp:build:
    desc: Build the doopl-mcp server binary to ./bin/doopl-mcp
    cmds:
      - mkdir -p bin
      - go build -trimpath -ldflags="-s -w" -o bin/doopl-mcp ./cmd/doopl-mcp

  mcp:install:
    desc: Install doopl-mcp server to $GOPATH/bin/doopl-mcp
    cmds:
      - go install -trimpath -ldflags="-s -w" ./cmd/doopl-mcp

  release:snapshot:
    desc: Build a snapshot release locally (for testing GoReleaser without tagging)
    cmds:
      - goreleaser release --snapshot --clean

  release:check:
    desc: Validate GoReleaser configuration
    cmds:
      - goreleaser check

  release:tag:
    desc: Increment version tag by +1 patch version, tag as 'latest', and push both tags
    cmds:
      - cmd: |
          # Get the latest numerical tag, or default to 0.0.0
          LAST_TAG=$(git describe --tags --match="v*" 2>/dev/null | sed 's/^v//' | cut -d- -f1 || echo "0.0.0")

          # Parse semantic version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"
          PATCH=$((PATCH + 1))

          # Create new tag
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          echo "Current tag: v$LAST_TAG"
          echo "New tag: $NEW_TAG"

          # Tag with the new version
          git tag "$NEW_TAG"

          # Tag as 'latest' (force update if it exists)
          git tag -f latest

          # Push both tags
          git push origin "$NEW_TAG"
          git push -f origin latest

          echo "✓ Tagged $NEW_TAG and updated 'latest' tag"
        sh: bash
