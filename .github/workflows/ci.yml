name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.24.x]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - uses: arduino/setup-task@v2
      - name: Cache Go binaries (revive, goverter)
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-bins-${{ runner.os }}-revive-v1.14.0-goverter-v1.9.4
          restore-keys: |
            go-bins-${{ runner.os }}-
      - run: go mod download
      - name: Install tools
        run: task tools
      - name: Run CI suite
        run: task
